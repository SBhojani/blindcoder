# blindcoder example configuration.
#
# Copy to $XDG_CONFIG_HOME/blindcoder/config.toml (usually ~/.config/blindcoder/config.toml)
# and edit. Every field is optional and falls back to the pinned default shown below.
# Precedence is: command-line flag > environment variable > this file > built-in default.

# --- selector tuneables ---------------------------------------------------------------------

# Price vs quality trade-off. 0 = ignore price (best quality); 0.5 = balanced;
# 1.0 = cost counts as a full quality point; 2.0 = ruthlessly cheap.
cost_sensitivity = 0.5

# Which shelf price feeds the cost bias. Blended because agentic context-resending makes input
# token volume large even though input is cheaper per token.
[cost_basis]
input_weight = 0.70
output_weight = 0.30

# How much a model's quality belief is shared across providers (0 = fully separate,
# 1 = identical everywhere).
provider_pooling = 0.3

# Extra credit for handling hard tasks, so "fine on hard" can outrank "great on trivial".
difficulty_credit = 0.75

# Recency: older ratings decay with this half-life (days). Lower = trust recent more.
rating_half_life_days = 60

# <1 = exploit/commit faster; >1 = explore more. This scales only the *evidenced* part of the
# posterior — an unrated candidate still draws uniform, so a lower value anneals per-candidate
# (explore the unseen, exploit the well-rated). Default lowered to 0.4 on simulate evidence.
exploration = 0.4

# How decisively a single rating moves the track record (logistic scale; larger = gentler).
score_spread = 2.0

# Cost-dominance pruning width, in posterior std-devs. A candidate is dropped only when its
# optimistic value still trails the strongest candidate's pessimistic value at this width.
# Higher = more conservative (prunes less). 2.0 prunes only provably-hopeless candidates.
prune_confidence = 2.0

# Track price history for the entire catalog (not just models you use). Off by default.
track_market = false

# How often to re-poll prices for the active pool (hours).
price_refresh_interval_hours = 24

# --- safety knobs ---------------------------------------------------------------------------

# Per-session spend kill-switch (USD). A session exceeding this is halted and you are prompted.
# A catastrophe bound on runaway agentic loops, not a budget lever. 0 disables it.
max_session_cost_usd = 5.0

# Freshness bound (days) on hand-maintained data-policy entries. Past this age a curated ZDR
# assertion is treated as stale and its models are excluded (fail-closed).
curated_policy_max_age_days = 90

# --- providers ------------------------------------------------------------------------------
# Declare each backend and the models it offers. Put the real API key in the environment
# variable named by `key_env` (never inline it here in a file you might share). Any
# OpenAI-compatible /chat/completions endpoint works — blindcoder never branches on which
# provider it is; everything provider-specific below is data, not code.
#
# Two knobs keep it provider-blind:
#   * extra_headers — extra HTTP headers sent on every request (e.g. attribution).
#   * extra_body    — a JSON object merged into every request body (e.g. provider-routing or
#                     data-policy/ZDR preferences).
#
# `canonical_key` is the provider-neutral identity the selector learns on: the SAME model
# offered by two providers should share one canonical_key, so its quality belief pools across
# providers while the two compete on price. `real_slug` is what that provider's API expects in
# the request `model` field. Omit prices for a free tier — it competes as a zero-cost candidate.

# A free provider (no prices, no passthrough needed).
# [[providers]]
# slug = "groq"
# base_url = "https://api.groq.com/openai/v1"
# wire = "openai"
# key_env = "GROQ_API_KEY"
#
#   [[providers.models]]
#   canonical_key = "kimi-k2"
#   real_slug = "moonshotai/kimi-k2-instruct"

# A priced gateway provider (same model, priced; attribution header + a routing body flag).
# [[providers]]
# slug = "openrouter"
# base_url = "https://openrouter.ai/api/v1"
# wire = "openai"
# key_env = "OPENROUTER_API_KEY"
# extra_headers = { "X-Title" = "blindcoder" }
# extra_body = { "provider" = { "require_parameters" = true } }
#
#   [[providers.models]]
#   canonical_key = "kimi-k2"            # same model as above → shared quality belief
#   real_slug = "moonshotai/kimi-k2"
#   input_per_mtok = 0.55
#   output_per_mtok = 2.2
