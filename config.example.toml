# blindcoder example configuration.
#
# Copy to $XDG_CONFIG_HOME/blindcoder/config.toml (usually ~/.config/blindcoder/config.toml)
# and edit. Every field is optional and falls back to the pinned default shown below.
# Precedence is: command-line flag > environment variable > this file > built-in default.

# --- selector tuneables ---------------------------------------------------------------------

# Price vs quality trade-off. 0 = ignore price (best quality); 0.5 = balanced;
# 1.0 = cost counts as a full quality point; 2.0 = ruthlessly cheap.
cost_sensitivity = 0.5

# Which shelf price feeds the cost bias. Blended because agentic context-resending makes input
# token volume large even though input is cheaper per token.
[cost_basis]
input_weight = 0.70
output_weight = 0.30

# How much a model's quality belief is shared across providers (0 = fully separate,
# 1 = identical everywhere).
provider_pooling = 0.3

# Extra credit for handling hard tasks, so "fine on hard" can outrank "great on trivial".
difficulty_credit = 0.75

# Recency: older ratings decay with this half-life (days). Lower = trust recent more.
rating_half_life_days = 60

# <1 = exploit/commit faster; >1 = explore more. This scales only the *evidenced* part of the
# posterior — an unrated candidate still draws uniform, so a lower value anneals per-candidate
# (explore the unseen, exploit the well-rated). Default lowered to 0.4 on simulate evidence.
exploration = 0.4

# How decisively a single rating moves the track record (logistic scale; larger = gentler).
score_spread = 2.0

# Cost-dominance pruning width, in posterior std-devs. A candidate is dropped only when its
# optimistic value still trails the strongest candidate's pessimistic value at this width.
# Higher = more conservative (prunes less). 2.0 prunes only provably-hopeless candidates.
prune_confidence = 2.0

# Track price history for the entire catalog (not just models you use). Off by default.
track_market = false

# How often to re-poll prices for the active pool (hours).
price_refresh_interval_hours = 24

# --- safety knobs ---------------------------------------------------------------------------

# Per-session spend kill-switch (USD). A session exceeding this is halted and you are prompted.
# A catastrophe bound on runaway agentic loops, not a budget lever. 0 disables it.
max_session_cost_usd = 5.0

# Freshness bound (days) on hand-maintained data-policy entries. Past this age a curated ZDR
# assertion is treated as stale and its models are excluded (fail-closed).
curated_policy_max_age_days = 90

# How much of each session is recorded. The default keeps only the signal the selector needs and
# never touches your prompts or code:
#   * "metadata" (default) — model ↔ rating ↔ cost ↔ time only, in the SQLite log. No wire data.
#   * "contents"           — reserved for a future level.
#   * "replay"             — additionally archive the raw four-leg wire exchange (cli/provider
#                            request + response) byte-exact to a disposable WARC file under
#                            $XDG_STATE_HOME/blindcoder/wire/<session_id>.warc (0600). These files
#                            hold your prompts and the model's output verbatim — opt in knowingly.
# capture_level = "metadata"

# --- providers ------------------------------------------------------------------------------
# Declare each backend and the models it offers. Provide the API key one of two ways:
#   * key_env = "GROQ_API_KEY"  — name an env var holding the key (preferred; keep secrets out of
#                                 files you might share).
#   * api_key = "sk-..."        — inline the key directly (convenience for a private, un-shared
#                                 config). If both are given, the env var WINS when it is set and
#                                 non-empty (precedence: flag > env > file), so a shell export can
#                                 still override the inline value for a one-off.
# Any OpenAI-compatible /chat/completions endpoint works — blindcoder never branches on which
# provider it is; everything provider-specific below is data, not code.
#
# Two passthrough knobs keep the wire provider-blind:
#   * extra_headers — extra HTTP headers sent on every request (e.g. attribution).
#   * extra_body    — a JSON object merged into every request body: provider-routing knobs like
#                     `sort`, `order`, `only`, `max_price` (see the gateway example below).
#
# `privacy` (REQUIRED — fail-closed) declares the provider's Zero-Data-Retention protocol; a provider
# without it is refused before any pick. This is the ONE place blindcoder is provider-aware: the ZDR
# mechanism genuinely differs per vendor, and at a security boundary a wrong setting must fail closed,
# not open. Accepted values:
#   * "open-router" — request-time ZDR. blindcoder injects `provider = { zdr = true,
#                     data_collection = "deny" }` into every request; OpenRouter itself 404s if no
#                     compliant endpoint matches. (Don't put zdr/data_collection in extra_body — the
#                     protocol owns them.)
#   * "groq"        — ZDR is an account-level console setting; nothing goes on the wire.
# Each value is verified against that provider's real endpoint host, so a declaration only counts for
# that provider's actual API (a mismatch is refused). Some protocols also require a one-time
# attestation that you completed their manual setup — if so, the run tells you exactly what to add.
#
# `canonical_key` is the provider-neutral identity the selector learns on: the SAME model
# offered by two providers should share one canonical_key, so its quality belief pools across
# providers while the two compete on price. `real_slug` is what that provider's API expects in
# the request `model` field. Omit prices for a free tier — it competes as a zero-cost candidate.
#
# Heads-up for agentic CLIs (OpenCode/aider/…): they send large system prompts + context (tens of
# thousands of tokens per request). A free tier with a low tokens-per-minute cap will reject those
# (e.g. Groq's free tier is ~8k TPM, so it can't serve an OpenCode-sized request). For those CLIs,
# lean on providers/tiers without a tiny TPM cap (paid OpenRouter models, or a provider's dev tier).

# A free provider (no prices, no passthrough needed).
# [[providers]]
# slug = "groq"
# base_url = "https://api.groq.com/openai/v1"
# wire = "openai"
# key_env = "GROQ_API_KEY"
# privacy = "groq"
#
#   [[providers.models]]
#   canonical_key = "kimi-k2"
#   real_slug = "moonshotai/kimi-k2-instruct"

# A priced gateway provider (same model, priced; attribution header + routing body knobs).
# On a gateway like OpenRouter a model is served by several providers at DIFFERENT prices; the
# `provider` object in extra_body controls routing (all forwarded verbatim). The ZDR data-policy
# flags (`zdr`, `data_collection`) are NOT set here — `privacy = "open-router"` injects them, so the
# privacy protocol is the single source of truth. The remaining routing knobs still go in extra_body:
#   sort = "price"                  -> route to the cheapest ELIGIBLE provider (also "throughput"/"latency")
#   order = ["prov-a","prov-b"]     -> try these providers in this order
#   only = ["prov-a"] / ignore=[..] -> restrict to / exclude specific providers
#   allow_fallbacks = false         -> use only the top provider (strict; fails if it is down)
#   max_price = { completion = 2.0, prompt = 0.5 }
#                                   -> only providers at/below these RATES ($/Mtok); hard fail if none
#                                      (a rate ceiling, NOT a per-request spend cap — cost = rate x tokens)
# (Provider slugs for order/only/ignore come from the documented GET /api/v1/providers list — read
#  each entry's `slug`. Whether a given provider serves a model under ZDR is not in that list; probe
#  it: only=[slug] + zdr=true + allow_fallbacks=false either routes there or errors.)
# These AND together. By DEFAULT the gateway load-balances across all ELIGIBLE providers, so without
# `sort` the price varies run to run and is often not the cheapest (the privacy filters restrict the
# eligible set but do not sort it). `sort = "price"` + a ZDR filter routes to the cheapest compliant
# provider deterministically. Even so, treat the input/output prices below as an estimate — the
# gateway returns the real per-request cost inline in the response usage.
# [[providers]]
# slug = "openrouter"
# base_url = "https://openrouter.ai/api/v1"
# wire = "openai"
# key_env = "OPENROUTER_API_KEY"
# privacy = "open-router"
# extra_headers = { "X-Title" = "blindcoder" }
# extra_body = { "provider" = { "sort" = "price" } }
#
#   [[providers.models]]
#   canonical_key = "kimi-k2"            # same model as above → shared quality belief
#   real_slug = "moonshotai/kimi-k2"
#   input_per_mtok = 0.55
#   output_per_mtok = 2.2
